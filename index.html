<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>指尖围棋 - AI对战</title>
    <style>
        :root {
            --bg-color: #f0e6d2; /* 木纹色背景 */
            --board-color: #eeb556;
            --black-stone: #111;
            --white-stone: #fcfcfc;
            --primary-btn: #4a90e2;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; /* 防止滚动 */
            touch-action: none; /* 禁止默认触摸行为 */
        }

        /* --- 登录界面 --- */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: center;
        }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            width: 250px;
            margin-top: 10px;
        }

        button.start-btn {
            padding: 12px 40px;
            background-color: var(--primary-btn);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button.start-btn:active {
            transform: scale(0.95);
        }

        /* --- 游戏主界面 --- */
        #game-container {
            display: none; /* 初始隐藏 */
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        header {
            width: 100%;
            padding: 10px 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .status-bar {
            font-size: 14px;
            padding: 0 15px;
            font-weight: bold;
        }

        #board-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            background-color: var(--board-color);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        canvas {
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* 悬浮控制栏 */
        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
            z-index: 20;
        }

        .control-btn {
            background: rgba(255,255,255,0.9);
            border: 1px solid #ccc;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        /* 思考提示 */
        #ai-thinking {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: none;
            pointer-events: none;
            z-index: 50;
        }

        /* 放大预览圈 (用于精准落子) */
        #preview-overlay {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px dashed red;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            z-index: 30;
        }
        
        .stone-label {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- 登录/设置界面 -->
    <div id="login-screen">
        <h1>🏳️ 指尖围棋</h1>
        <div class="input-group">
            <label>玩家昵称</label><br>
            <input type="text" id="username" placeholder="请输入你的名字" value="棋手">
        </div>
        <div class="input-group">
            <label>AI 难度</label><br>
            <select id="difficulty">
                <option value="easy">简单 (新手)</option>
                <option value="medium" selected>中等 (入门)</option>
                <option value="hard">困难 (业余)</option>
            </select>
        </div>
        <button class="start-btn" onclick="startGame()">开始对局</button>
    </div>

    <!-- 游戏界面 -->
    <div id="game-container">
        <header>
            <div class="status-bar">
                <span id="player-name">玩家</span> (黑) vs <span id="ai-name">AI</span> (白)
            </div>
            <div class="status-bar" id="game-status">黑方落子</div>
        </header>

        <div id="board-wrapper">
            <canvas id="go-board"></canvas>
            <div id="preview-overlay"></div> <!-- 辅助瞄准 -->
            
            <div id="ai-thinking">AI 思考中...</div>
            
            <div class="controls">
                <button class="control-btn" onclick="game.pass()">停一手 (Pass)</button>
                <button class="control-btn" onclick="location.reload()">重新开始</button>
            </div>
        </div>
    </div>

<script>
/**
 * 围棋核心逻辑与UI控制
 */

// 常量定义
const BOARD_SIZE = 19;
const EMPTY = 0;
const BLACK = 1; // 玩家
const WHITE = 2; // AI

class GoGame {
    constructor(canvasId, difficulty) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.difficulty = difficulty;
        
        // 游戏状态
        this.board = []; // 二维数组
        this.currentPlayer = BLACK;
        this.koPoint = null; // 打劫点
        this.lastMove = null;
        this.isGameOver = false;
        this.aiThinking = false;

        // UI 尺寸计算
        this.cellSize = 0;
        this.padding = 0;
        this.stoneRadius = 0;

        this.initBoard();
        this.resize();
        
        // 绑定事件
        window.addEventListener('resize', () => this.resize());
        
        // 触摸/点击处理
        this.canvas.addEventListener('pointerdown', (e) => this.handleInput(e));
    }

    initBoard() {
        this.board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(EMPTY));
    }

    resize() {
        const wrapper = document.getElementById('board-wrapper');
        const size = Math.min(wrapper.clientWidth, wrapper.clientHeight);
        
        // 高清屏适配
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = size * dpr;
        this.canvas.height = size * dpr;
        this.canvas.style.width = `${size}px`;
        this.canvas.style.height = `${size}px`;
        this.ctx.scale(dpr, dpr);

        this.padding = size * 0.06; // 边距
        this.cellSize = (size - 2 * this.padding) / (BOARD_SIZE - 1);
        this.stoneRadius = this.cellSize * 0.45;

        this.draw();
    }

    draw() {
        const size = this.canvas.width / (window.devicePixelRatio || 1);
        
        // 清空画布
        this.ctx.clearRect(0, 0, size, size);

        // 绘制网格
        this.ctx.beginPath();
        this.ctx.strokeStyle = "#000";
        this.ctx.lineWidth = 1;

        for (let i = 0; i < BOARD_SIZE; i++) {
            // 横线
            this.ctx.moveTo(this.padding, this.padding + i * this.cellSize);
            this.ctx.lineTo(size - this.padding, this.padding + i * this.cellSize);
            // 竖线
            this.ctx.moveTo(this.padding + i * this.cellSize, this.padding);
            this.ctx.lineTo(this.padding + i * this.cellSize, size - this.padding);
        }
        this.ctx.stroke();

        // 绘制星位 (简化版：只画几个主要星位)
        const stars = [3, 9, 15];
        this.ctx.fillStyle = "#000";
        for(let r of stars) {
            for(let c of stars) {
                this.ctx.beginPath();
                this.ctx.arc(
                    this.padding + c * this.cellSize, 
                    this.padding + r * this.cellSize, 
                    3, 0, Math.PI * 2
                );
                this.ctx.fill();
            }
        }

        // 绘制棋子
        for (let y = 0; y < BOARD_SIZE; y++) {
            for (let x = 0; x < BOARD_SIZE; x++) {
                if (this.board[y][x] !== EMPTY) {
                    this.drawStone(x, y, this.board[y][x]);
                }
            }
        }

        // 标记最后一步
        if (this.lastMove) {
            const {x, y} = this.lastMove;
            this.ctx.beginPath();
            this.ctx.strokeStyle = this.board[y][x] === BLACK ? "white" : "black";
            this.ctx.lineWidth = 2;
            this.ctx.arc(
                this.padding + x * this.cellSize,
                this.padding + y * this.cellSize,
                this.stoneRadius * 0.5, 0, Math.PI * 2
            );
            this.ctx.stroke();
        }
    }

    drawStone(x, y, color) {
        const cx = this.padding + x * this.cellSize;
        const cy = this.padding + y * this.cellSize;

        this.ctx.beginPath();
        this.ctx.arc(cx, cy, this.stoneRadius, 0, Math.PI * 2);
        
        // 渐变效果让棋子更有立体感
        const grad = this.ctx.createRadialGradient(
            cx - this.stoneRadius/3, cy - this.stoneRadius/3, this.stoneRadius/10,
            cx, cy, this.stoneRadius
        );

        if (color === BLACK) {
            grad.addColorStop(0, "#555");
            grad.addColorStop(1, "#000");
        } else {
            grad.addColorStop(0, "#fff");
            grad.addColorStop(1, "#ddd");
        }

        this.ctx.fillStyle = grad;
        this.ctx.fill();
    }

    handleInput(e) {
        if (this.isGameOver || this.currentPlayer !== BLACK || this.aiThinking) return;

        const rect = this.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // 转换为网格坐标
        const gridX = Math.round((x - this.padding) / this.cellSize);
        const gridY = Math.round((y - this.padding) / this.cellSize);

        // 边界检查
        if (gridX < 0 || gridX >= BOARD_SIZE || gridY < 0 || gridY >= BOARD_SIZE) return;

        // 尝试落子
        this.attemptMove(gridX, gridY);
    }

    attemptMove(x, y) {
        if (this.board[y][x] !== EMPTY) return; // 已经有子
        
        // 打劫检查
        if (this.koPoint && this.koPoint.x === x && this.koPoint.y === y) {
            alert("打劫！不能立即回提。");
            return;
        }

        // 模拟落子以检查自杀和提子
        const captured = this.checkCaptures(x, y, this.currentPlayer);
        
        // 自杀规则检查 (如果没有提子，且自己气为0，则是自杀)
        if (captured.length === 0 && this.countLiberties(x, y, this.currentPlayer, [...this.getGroup(x, y)]) === 0) {
             // 简单提示，实际游戏中通常不允许自杀
             // 这里为了简化，允许pass或者提示
             console.log("禁入点 (自杀)");
             return; 
        }

        // 执行落子
        this.placeStone(x, y, captured);
    }

    placeStone(x, y, capturedStones) {
        this.board[y][x] = this.currentPlayer;
        
        // 移除死子
        capturedStones.forEach(stone => {
            this.board[stone.y][stone.x] = EMPTY;
        });

        this.lastMove = {x, y};
        
        // 更新打劫点
        if (capturedStones.length === 1 && this.getGroup(x, y).length === 1 && this.countLiberties(x,y,this.currentPlayer, [{x,y}]) === 1) {
             this.koPoint = capturedStones[0];
        } else {
             this.koPoint = null;
        }

        this.draw();
        this.switchTurn();
    }

    switchTurn() {
        this.currentPlayer = (this.currentPlayer === BLACK) ? WHITE : BLACK;
        document.getElementById('game-status').innerText = 
            this.currentPlayer === BLACK ? "轮到你了 (黑)" : "AI 思考中...";

        if (this.currentPlayer === WHITE) {
            this.aiThinking = true;
            document.getElementById('ai-thinking').style.display = 'block';
            
            // 模拟思考时间 (1秒到5秒之间，不超过20秒限制)
            const thinkTime = Math.random() * 2000 + 1000; 
            
            setTimeout(() => {
                this.makeAIMove();
                this.aiThinking = false;
                document.getElementById('ai-thinking').style.display = 'none';
            }, thinkTime);
        }
    }

    pass() {
        if(this.currentPlayer !== BLACK) return;
        this.currentPlayer = WHITE;
        this.koPoint = null;
        this.switchTurn(); // AI will play next
    }

    // --- 核心逻辑辅助函数 ---

    getGroup(x, y, color = this.board[y][x]) {
        const group = [];
        const visited = new Set();
        const stack = [{x, y}];
        
        while(stack.length > 0) {
            const curr = stack.pop();
            const key = `${curr.x},${curr.y}`;
            if(visited.has(key)) continue;
            visited.add(key);
            
            if(this.board[curr.y][curr.x] === color) {
                group.push(curr);
                // 检查四周
                [[0,1], [0,-1], [1,0], [-1,0]].forEach(([dx, dy]) => {
                    const nx = curr.x + dx, ny = curr.y + dy;
                    if(nx>=0 && nx<BOARD_SIZE && ny>=0 && ny<BOARD_SIZE) {
                        stack.push({x:nx, y:ny});
                    }
                });
            }
        }
        return group;
    }

    countLiberties(x, y, color, group) {
        if(!group) group = this.getGroup(x, y, color);
        const liberties = new Set();
        
        group.forEach(stone => {
            [[0,1], [0,-1], [1,0], [-1,0]].forEach(([dx, dy]) => {
                const nx = stone.x + dx, ny = stone.y + dy;
                if(nx>=0 && nx<BOARD_SIZE && ny>=0 && ny<BOARD_SIZE) {
                    if(this.board[ny][nx] === EMPTY) {
                        liberties.add(`${nx},${ny}`);
                    }
                }
            });
        });
        return liberties.size;
    }

    checkCaptures(x, y, color) {
        const opponent = color === BLACK ? WHITE : BLACK;
        let allCaptured = [];
        
        // 临时放置棋子
        this.board[y][x] = color;

        [[0,1], [0,-1], [1,0], [-1,0]].forEach(([dx, dy]) => {
            const nx = x + dx, ny = y + dy;
            if(nx>=0 && nx<BOARD_SIZE && ny>=0 && ny<BOARD_SIZE) {
                if(this.board[ny][nx] === opponent) {
                    const group = this.getGroup(nx, ny, opponent);
                    if(this.countLiberties(nx, ny, opponent, group) === 0) {
                        allCaptured = allCaptured.concat(group);
                    }
                }
            }
        });

        // 恢复棋盘状态 (只是检查，还没真下)
        this.board[y][x] = EMPTY;
        // 注意：这里不需要恢复被提掉的子，因为那些子在逻辑上已经是死子，
        // 但为了严谨，checkCaptures通常在placeStone前调用。
        // 实际上这里返回的是如果下了这一步，会提掉哪些子。
        
        return allCaptured;
    }

    // --- AI 逻辑 ---

    makeAIMove() {
        const moves = this.generateMoves();
        if (moves.length === 0) {
            this.pass(); // 无处可下
            return;
        }

        let bestMove = null;
        let maxScore = -Infinity;

        // 遍历所有可行步并打分
        for (let move of moves) {
            let score = this.evaluateMove(move.x, move.y);
            
            // 根据难度添加随机因子
            if (this.difficulty === 'easy') {
                score += Math.random() * 50; 
            } else if (this.difficulty === 'medium') {
                score += Math.random() * 20;
            } else {
                // Hard: 纯策略，极少随机
                score += Math.random() * 5;
            }

            if (score > maxScore) {
                maxScore = score;
                bestMove = move;
            }
        }

        if (bestMove) {
            // 真正执行落子逻辑
            const captured = this.checkCaptures(bestMove.x, bestMove.y, WHITE);
            // 再次检查自杀 (AI不会自杀)
            if(captured.length > 0 || this.countLiberties(bestMove.x, bestMove.y, WHITE, [{x:bestMove.x, y:bestMove.y}]) > 0) {
                 this.placeStone(bestMove.x, bestMove.y, captured);
            } else {
                // 如果最好的步是自杀，那就Pass
                this.pass();
            }
        } else {
            this.pass();
        }
    }

    generateMoves() {
        const moves = [];
        for(let y=0; y<BOARD_SIZE; y++) {
            for(let x=0; x<BOARD_SIZE; x++) {
                if(this.board[y][x] === EMPTY) {
                    // 简单的剪枝：如果周围没有棋子，除非是开局或大场，否则降低优先级（这里简化为全遍历）
                    // 为了性能，可以只遍历有棋子周围的空位，但19路全盘扫描在现代手机上也就几毫秒
                    moves.push({x, y});
                }
            }
        }
        return moves;
    }

    evaluateMove(x, y) {
        let score = 0;
        const myColor = WHITE;
        const oppColor = BLACK;

        // 1. 模拟落子
        this.board[y][x] = myColor;
        
        // 2. 检查能否提掉对方 (吃子加分)
        let capturedCount = 0;
        const neighbors = [[0,1], [0,-1], [1,0], [-1,0]];
        neighbors.forEach(([dx, dy]) => {
            const nx = x+dx, ny = y+dy;
            if(this.isOnBoard(nx, ny) && this.board[ny][nx] === oppColor) {
                if(this.countLiberties(nx, ny, oppColor) === 0) {
                    capturedCount++;
                    score += 100; // 吃子高分
                }
            }
        });

        // 3. 检查自身气 (避免被吃)
        const myLiberties = this.countLiberties(x, y, myColor);
        if (myLiberties === 0) {
            // 自杀步，极低分，除非吃子了
            if(capturedCount === 0) {
                this.board[y][x] = EMPTY;
                return -9999; 
            }
        } else if (myLiberties === 1) {
            score -= 20; // 气紧，危险
        }

        // 4. 距离中心的远近 (金角银边草肚皮，稍微倾向于中间一点点或者随机)
        const distToCenter = Math.abs(x - 9) + Math.abs(y - 9);
        score -= distToCenter * 0.5; 

        // 5. 模式匹配 (Hard模式特有)
        if (this.difficulty === 'hard') {
            // 简单模仿：如果这步棋能让自己连成一片，加分
            let connections = 0;
            neighbors.forEach(([dx, dy]) => {
                const nx = x+dx, ny = y+dy;
                if(this.isOnBoard(nx, ny) && this.board[ny][nx] === myColor) {
                    connections++;
                }
            });
            score += connections * 5;
            
            // 占据星位附近
            if ((x===3||x===9||x===15) && (y===3||y===9||y===15)) score += 10;
        }

        // 还原棋盘
        this.board[y][x] = EMPTY;

        return score;
    }

    isOnBoard(x, y) {
        return x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE;
    }
}

// --- 全局控制 ---
let game;

function startGame() {
    const username = document.getElementById('username').value || "玩家";
    const difficulty = document.getElementById('difficulty').value;
    
    document.getElementById('player-name').innerText = username;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    
    // 初始化游戏
    game = new GoGame('go-board', difficulty);
}

</script>
</body>
</html>
