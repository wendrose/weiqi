<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>围棋 - 双人对弈</title>
    <style>
        :root {
            --bg: #f5f0e8;
            --board-wood: #dcb97a;
            --board-wood-dark: #c9a35f;
            --text: #3d3226;
            --text-light: #6b5e4f;
            --black-stone: #1a1a1a;
            --white-stone: #f5f5f0;
            --accent: #8b5e3c;
            --danger: #c0392b;
            --safe: #4a7c59;
            --gold: #c8963e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.18);
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(160deg, #e8e0d3 0%, #f0e8d8 30%, #e5dcc8 60%, #ece3d4 100%);
            background-attachment: fixed;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            overflow-x: hidden;
            padding: 8px;
        }

        /* ========== 登录界面 ========== */
        .login-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: linear-gradient(160deg, #e8e0d3 0%, #f0e8d8 30%, #e5dcc8 60%, #ece3d4 100%);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .login-container.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .login-card {
            background: #fffef9;
            border-radius: 24px;
            padding: 32px 24px 28px;
            width: 92vw;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative;
            border: 1px solid rgba(180, 150, 110, 0.25);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 35% 35%, #f5f5f0 0%, #d5d0c5 50%, #b8a890 100%);
            border-radius: 50%;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2), inset 0 -3px 6px rgba(0, 0, 0, 0.15);
        }
        .login-card::after {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 40% 35%, #2a2a2a 0%, #0a0a0a 60%, #1a1a1a 100%);
            border-radius: 50%;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
            z-index: 2;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #3d3226;
            margin-top: 48px;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #8b7b65;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #5c4f3d;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e0d5c0;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-family: var(--font);
            background: #fdfaf4;
            color: #3d3226;
            transition: all 0.25s ease;
            outline: none;
        }
        .input-group input:focus {
            border-color: #b8945c;
            box-shadow: 0 0 0 3px rgba(180, 140, 90, 0.1);
            background: #fffefb;
        }

        .color-select {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .color-option {
            flex: 1;
            padding: 14px 8px;
            border-radius: var(--radius-sm);
            border: 2px solid #e0d5c0;
            background: #fdfaf4;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: #5c4f3d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .color-option:active {
            transform: scale(0.96);
        }
        .color-option.selected {
            border-color: #b8945c;
            background: #fef9f0;
            box-shadow: 0 0 0 3px rgba(180, 140, 90, 0.15);
            color: #3d3226;
        }
        .stone-dot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }
        .stone-dot.black {
            background: radial-gradient(circle at 38% 32%, #4a4a4a 0%, #0a0a0a 55%, #1a1a1a 100%);
        }
        .stone-dot.white {
            background: radial-gradient(circle at 38% 32%, #ffffff 0%, #e8e4d8 45%, #c8c0b0 100%);
            border: 1px solid #d0c8b8;
        }
        .stone-dot.random {
            background: conic-gradient(#1a1a1a 0deg 180deg, #f5f5f0 180deg 360deg);
            border-radius: 50%;
        }

        .btn-start {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #5c3d2e 0%, #3d2216 100%);
            color: #f5e6d0;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(60, 30, 15, 0.3);
            font-family: var(--font);
        }
        .btn-start:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(60, 30, 15, 0.3);
            background: linear-gradient(135deg, #4a2e20 0%, #2d1810 100%);
        }

        /* ========== 游戏主界面 ========== */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 480px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
            pointer-events: none;
        }
        .game-container.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 8px 12px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 25px;
            background: #fffef8;
            box-shadow: var(--shadow);
            font-weight: 600;
            font-size: 14px;
            color: #3d3226;
            border: 2px solid transparent;
            transition: all 0.35s ease;
            min-width: 90px;
            justify-content: center;
        }
        .player-info.active-player {
            border-color: #c8963e;
            box-shadow: 0 0 0 6px rgba(200, 150, 62, 0.2), var(--shadow);
            animation: pulse-border 2s ease-in-out infinite;
        }
        @keyframes pulse-border {
            0%,
            100% {
                box-shadow: 0 0 0 6px rgba(200, 150, 62, 0.2), var(--shadow);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(200, 150, 62, 0.05), var(--shadow);
            }
        }
        .player-stone-sm {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        }
        .player-stone-sm.black-sm {
            background: radial-gradient(circle at 38% 32%, #4a4a4a 0%, #0a0a0a 55%, #1a1a1a 100%);
        }
        .player-stone-sm.white-sm {
            background: radial-gradient(circle at 38% 32%, #ffffff 0%, #e8e4d8 45%, #c8c0b0 100%);
            border: 1px solid #d0c8b8;
        }
        .captured-count {
            font-size: 12px;
            color: #8b7b65;
            font-weight: 500;
        }

        .vs-badge {
            font-weight: 700;
            color: #8b5e3c;
            font-size: 13px;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        /* 棋盘容器 */
        .board-wrapper {
            position: relative;
            width: 94vw;
            width: min(94vw, 440px);
            aspect-ratio: 1 / 1;
            max-height: 70vh;
            max-height: 70dvh;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            background: #c9a35f;
            cursor: pointer;
        }
        .board-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: manipulation;
        }
        .board-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: var(--radius);
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.08), inset 0 0 60px rgba(0, 0, 0, 0.15);
            z-index: 2;
        }

        /* 按钮区 */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            padding: 0 8px;
        }
        .btn {
            padding: 12px 18px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            font-family: var(--font);
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-pass {
            background: #fffef8;
            color: #5c4f3d;
            border: 2px solid #d5c8b0;
        }
        .btn-pass:active {
            background: #f5efe0;
        }
        .btn-undo {
            background: #fffef8;
            color: #5c4f3d;
            border: 2px solid #d5c8b0;
        }
        .btn-undo:active {
            background: #f5efe0;
        }
        .btn-resign {
            background: #fff5f5;
            color: #a04040;
            border: 2px solid #e0c0c0;
        }
        .btn-resign:active {
            background: #fde8e8;
        }
        .btn-restart {
            background: #5c3d2e;
            color: #f5e6d0;
            border: 2px solid #4a2e20;
        }
        .btn-restart:active {
            background: #4a2e20;
        }

        /* 游戏结束弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            background: #fffef9;
            border-radius: 20px;
            padding: 28px 22px 22px;
            width: 88vw;
            max-width: 380px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(180, 150, 110, 0.3);
        }
        .modal-card h3 {
            font-size: 22px;
            color: #3d3226;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .modal-card .result-detail {
            font-size: 14px;
            color: #6b5e4f;
            margin-bottom: 16px;
            line-height: 1.7;
        }
        .modal-card .winner-highlight {
            font-weight: 700;
            color: #c8963e;
            font-size: 18px;
        }
        .modal-card .btn {
            margin: 6px;
            display: inline-flex;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #3d3226;
            color: #f5e6d0;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            z-index: 300;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式调整 */
        @media (max-width: 360px) {
            .board-wrapper {
                width: 96vw;
                border-radius: 10px;
            }
            .btn {
                padding: 10px 14px;
                font-size: 13px;
                border-radius: 22px;
            }
            .player-info {
                padding: 8px 10px;
                font-size: 12px;
                gap: 6px;
                border-radius: 20px;
            }
            .player-stone-sm {
                width: 18px;
                height: 18px;
            }
            .game-header {
                padding: 4px 6px;
                gap: 6px;
            }
        }
        @media (min-width: 420px) {
            .board-wrapper {
                border-radius: 18px;
            }
            .btn {
                padding: 13px 22px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 登录界面 ==================== -->
    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <div class="login-title">围 棋</div>
            <div class="login-subtitle">千年智慧 · 方寸之间</div>
            <div class="input-group">
                <label>👤 你的昵称</label>
                <input type="text" id="nicknameInput" placeholder="输入昵称..." maxlength="20" autocomplete="off">
            </div>
            <div class="input-group">
                <label>🎯 选择执子</label>
            </div>
            <div class="color-select" id="colorSelect">
                <div class="color-option selected" data-color="random">
                    <div class="stone-dot random"></div> 随机
                </div>
                <div class="color-option" data-color="black">
                    <div class="stone-dot black"></div> 执黑
                </div>
                <div class="color-option" data-color="white">
                    <div class="stone-dot white"></div> 执白
                </div>
            </div>
            <button class="btn-start" id="btnStart">开 始 对 弈</button>
        </div>
    </div>

    <!-- ==================== 游戏界面 ==================== -->
    <div class="game-container" id="gameContainer">
        <!-- 顶部信息栏 -->
        <div class="game-header">
            <div class="player-info active-player" id="playerBlackInfo">
                <div class="player-stone-sm black-sm"></div>
                <span id="blackName">黑方</span>
                <span class="captured-count" id="blackCaptured">提子: 0</span>
            </div>
            <div class="vs-badge">⚔️ VS ⚔️</div>
            <div class="player-info" id="playerWhiteInfo">
                <div class="player-stone-sm white-sm"></div>
                <span id="whiteName">白方</span>
                <span class="captured-count" id="whiteCaptured">提子: 0</span>
            </div>
        </div>

        <!-- 棋盘 -->
        <div class="board-wrapper" id="boardWrapper">
            <canvas id="boardCanvas"></canvas>
        </div>

        <!-- 按钮 -->
        <div class="btn-row">
            <button class="btn btn-pass" id="btnPass">🤚 虚手</button>
            <button class="btn btn-undo" id="btnUndo">↩ 悔棋</button>
            <button class="btn btn-resign" id="btnResign">🏳 认输</button>
            <button class="btn btn-restart" id="btnRestart">🔄 重新开始</button>
        </div>
    </div>

    <!-- ==================== 结束弹窗 ==================== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <h3 id="modalTitle">🎉 游戏结束</h3>
            <div class="result-detail" id="modalDetail"></div>
            <button class="btn btn-restart" id="btnModalRestart">🔄 再来一局</button>
            <button class="btn btn-pass" id="btnModalClose">✕ 关闭</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ DOM元素 ============
            const loginContainer = document.getElementById('loginContainer');
            const gameContainer = document.getElementById('gameContainer');
            const nicknameInput = document.getElementById('nicknameInput');
            const colorSelect = document.getElementById('colorSelect');
            const btnStart = document.getElementById('btnStart');
            const boardWrapper = document.getElementById('boardWrapper');
            const boardCanvas = document.getElementById('boardCanvas');
            const ctx = boardCanvas.getContext('2d');
            const btnPass = document.getElementById('btnPass');
            const btnUndo = document.getElementById('btnUndo');
            const btnResign = document.getElementById('btnResign');
            const btnRestart = document.getElementById('btnRestart');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalTitle = document.getElementById('modalTitle');
            const modalDetail = document.getElementById('modalDetail');
            const btnModalRestart = document.getElementById('btnModalRestart');
            const btnModalClose = document.getElementById('btnModalClose');
            const toast = document.getElementById('toast');
            const playerBlackInfo = document.getElementById('playerBlackInfo');
            const playerWhiteInfo = document.getElementById('playerWhiteInfo');
            const blackNameEl = document.getElementById('blackName');
            const whiteNameEl = document.getElementById('whiteName');
            const blackCapturedEl = document.getElementById('blackCaptured');
            const whiteCapturedEl = document.getElementById('whiteCaptured');

            // ============ 游戏状态 ============
            const BOARD_SIZE = 19;
            const EMPTY = 0;
            const BLACK = 1;
            const WHITE = 2;

            let board = []; // board[row][col] = 0|1|2
            let currentPlayer = BLACK;
            let capturedCount = { [BLACK]: 0, [WHITE]: 0 }; // 被对方提走的数量（黑被白提、白被黑提）
            let moveHistory = [];
            let previousBoardHash = null; // 用于打劫判断（上一步的棋盘哈希）
            let passCount = 0;
            let gameOver = false;
            let winner = null;
            let lastMove = null; // {row, col} 最后一手位置
            let userColorPreference = 'random'; // 用户选择的颜色
            let userName = '';
            let opponentName = '对手';
            let hoveredCell = null; // {row, col} 预览落子位置

            // Canvas相关
            let canvasLogicalSize = 400; // canvas的逻辑尺寸
            let cellSize = 18;
            let padding = 28;
            let dpr = Math.min(window.devicePixelRatio || 1, 2); // 设备像素比，上限2

            // ============ 初始化棋盘 ============
            function createEmptyBoard() {
                const b = [];
                for (let r = 0; r < BOARD_SIZE; r++) {
                    b[r] = new Array(BOARD_SIZE).fill(EMPTY);
                }
                return b;
            }

            function resetGame() {
                board = createEmptyBoard();
                currentPlayer = BLACK;
                capturedCount = { [BLACK]: 0, [WHITE]: 0 };
                moveHistory = [];
                previousBoardHash = null;
                passCount = 0;
                gameOver = false;
                winner = null;
                lastMove = null;
                hoveredCell = null;
                updateCapturedDisplay();
                updatePlayerHighlight();
                drawBoard();
            }

            // ============ 棋盘哈希（用于打劫判断） ============
            function getBoardHash() {
                // 使用简单字符串哈希
                let s = '';
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        s += board[r][c];
                    }
                }
                return s;
            }

            // ============ 找棋组和计算气 ============
            function getGroup(row, col) {
                const color = board[row][col];
                if (color === EMPTY) return { stones: [], liberties: new Set() };
                const visited = new Set();
                const stones = [];
                const liberties = new Set();
                const stack = [{ row, col }];
                visited.add(`${row},${col}`);
                while (stack.length > 0) {
                    const { row: r, col: c } = stack.pop();
                    stones.push({ row: r, col: c });
                    const neighbors = getNeighbors(r, c);
                    for (const { row: nr, col: nc } of neighbors) {
                        const key = `${nr},${nc}`;
                        if (board[nr][nc] === EMPTY) {
                            liberties.add(key);
                        } else if (board[nr][nc] === color && !visited.has(key)) {
                            visited.add(key);
                            stack.push({ row: nr, col: nc });
                        }
                    }
                }
                return { stones, liberties };
            }

            function getNeighbors(row, col) {
                const neighbors = [];
                if (row > 0) neighbors.push({ row: row - 1, col });
                if (row < BOARD_SIZE - 1) neighbors.push({ row: row + 1, col });
                if (col > 0) neighbors.push({ row, col: col - 1 });
                if (col < BOARD_SIZE - 1) neighbors.push({ row, col: col + 1 });
                return neighbors;
            }

            function getLibertyCount(row, col) {
                const color = board[row][col];
                if (color === EMPTY) return 0;
                const { liberties } = getGroup(row, col);
                return liberties.size;
            }

            // ============ 查找相邻对方棋组并提子 ============
            function findCapturedOpponentGroups(row, col, playerColor) {
                const opponentColor = playerColor === BLACK ? WHITE : BLACK;
                const capturedStones = [];
                const checked = new Set();
                const neighbors = getNeighbors(row, col);
                for (const { row: nr, col: nc } of neighbors) {
                    const key = `${nr},${nc}`;
                    if (board[nr][nc] === opponentColor && !checked.has(key)) {
                        const group = getGroup(nr, nc);
                        for (const stone of group.stones) {
                            checked.add(`${stone.row},${stone.col}`);
                        }
                        if (group.liberties.size === 0) {
                            for (const stone of group.stones) {
                                capturedStones.push({ row: stone.row, col: stone.col, color: opponentColor });
                            }
                        }
                    }
                }
                return capturedStones;
            }

            // ============ 检查自杀 ============
            function isSuicide(row, col, playerColor) {
                // 暂时放置棋子
                board[row][col] = playerColor;
                // 先检查是否能提掉对方棋子
                const captured = findCapturedOpponentGroups(row, col, playerColor);
                // 临时提掉对方棋子
                const removedStones = [];
                for (const { row: cr, col: cc } of captured) {
                    removedStones.push({ row: cr, col: cc, color: board[cr][cc] });
                    board[cr][cc] = EMPTY;
                }
                // 检查自己棋组的气
                const { liberties } = getGroup(row, col);
                const suicide = liberties.size === 0;
                // 恢复
                for (const { row: rr, col: rc, color: rcolor } of removedStones) {
                    board[rr][rc] = rcolor;
                }
                board[row][col] = EMPTY;
                return suicide && captured.length === 0;
            }

            // ============ 检查打劫 ============
            function isKoViolation(row, col, playerColor) {
                // 模拟落子后的棋盘哈希
                board[row][col] = playerColor;
                const captured = findCapturedOpponentGroups(row, col, playerColor);
                const removedStones = [];
                for (const { row: cr, col: cc } of captured) {
                    removedStones.push({ row: cr, col: cc, color: board[cr][cc] });
                    board[cr][cc] = EMPTY;
                }
                const newHash = getBoardHash();
                // 恢复
                for (const { row: rr, col: rc, color: rcolor } of removedStones) {
                    board[rr][rc] = rcolor;
                }
                board[row][col] = EMPTY;
                // 如果新哈希与上一步哈希相同，则是打劫
                return newHash === previousBoardHash;
            }

            // ============ 落子逻辑 ============
            function placeStone(row, col) {
                if (gameOver) return false;
                if (board[row][col] !== EMPTY) return false;
                if (isSuicide(row, col, currentPlayer)) return false;
                if (isKoViolation(row, col, currentPlayer)) {
                    showToast('⛔ 打劫！不能立即回提');
                    return false;
                }

                // 保存上一步哈希
                const oldHash = getBoardHash();

                // 放置棋子
                board[row][col] = currentPlayer;
                const captured = findCapturedOpponentGroups(row, col, currentPlayer);
                const capturedPositions = [];
                for (const { row: cr, col: cc, color: ccolor } of captured) {
                    capturedPositions.push({ row: cr, col: cc, color: ccolor });
                    board[cr][cc] = EMPTY;
                    capturedCount[currentPlayer]++; // 当前玩家提掉对方棋子
                }

                // 保存移动历史
                moveHistory.push({
                    row,
                    col,
                    player: currentPlayer,
                    captured: capturedPositions,
                    previousHash: oldHash,
                    previousPassCount: passCount,
                    previousLastMove: lastMove ? { row: lastMove.row, col: lastMove.col } : null,
                });

                previousBoardHash = getBoardHash();
                lastMove = { row, col };
                passCount = 0;
                currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
                updateCapturedDisplay();
                updatePlayerHighlight();
                drawBoard();

                // 检查是否有提子动画需要展示
                if (capturedPositions.length > 0) {
                    const count = capturedPositions.length;
                    const colorName = capturedPositions[0].color === BLACK ? '黑子' : '白子';
                    showToast(`🔥 提走 ${count} 颗${colorName}！`);
                }
                return true;
            }

            // ============ 虚手 ============
            function doPass() {
                if (gameOver) return;
                const oldHash = getBoardHash();
                moveHistory.push({
                    row: -1,
                    col: -1,
                    player: currentPlayer,
                    captured: [],
                    previousHash: oldHash,
                    previousPassCount: passCount,
                    previousLastMove: lastMove ? { row: lastMove.row, col: lastMove.col } : null,
                    isPass: true,
                });
                previousBoardHash = oldHash;
                passCount++;
                lastMove = null;
                if (passCount >= 2) {
                    endGame();
                } else {
                    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
                    updatePlayerHighlight();
                    drawBoard();
                    showToast('🤚 ' + (currentPlayer === BLACK ? '黑方' : '白方') + '虚手，轮到对方');
                }
            }

            // ============ 悔棋 ============
            function undoMove() {
                if (gameOver) return;
                if (moveHistory.length === 0) {
                    showToast('没有可悔的棋步');
                    return;
                }
                const lastMoveRecord = moveHistory.pop();
                if (lastMoveRecord.isPass) {
                    // 撤销虚手
                    passCount = lastMoveRecord.previousPassCount;
                    currentPlayer = lastMoveRecord.player;
                    previousBoardHash = lastMoveRecord.previousHash;
                    lastMove = lastMoveRecord.previousLastMove;
                } else {
                    // 撤销落子
                    const { row, col, player, captured, previousHash, previousPassCount, previousLastMove } =
                    lastMoveRecord;
                    board[row][col] = EMPTY;
                    for (const { row: cr, col: cc, color: ccolor } of captured) {
                        board[cr][cc] = ccolor;
                        capturedCount[player]--;
                    }
                    currentPlayer = player;
                    previousBoardHash = previousHash;
                    passCount = previousPassCount;
                    lastMove = previousLastMove;
                }
                updateCapturedDisplay();
                updatePlayerHighlight();
                drawBoard();
                showToast('↩ 已悔棋');
            }

            // ============ 认输 ============
            function resign() {
                if (gameOver) return;
                winner = currentPlayer === BLACK ? WHITE : BLACK;
                gameOver = true;
                updatePlayerHighlight();
                drawBoard();
                showResultModal();
            }

            // ============ 结束游戏（双pass） ============
            function endGame() {
                gameOver = true;
                // 计算得分
                const score = calculateScore();
                if (score.black > score.white) {
                    winner = BLACK;
                } else if (score.white > score.black) {
                    winner = WHITE;
                } else {
                    winner = null; // 平局
                }
                updatePlayerHighlight();
                drawBoard();
                showResultModal(score);
            }

            // ============ 领地计算 ============
            function calculateScore() {
                // 使用泛洪填充确定空地归属
                const territoryOwner = createEmptyBoard(); // 0=未确定, 1=黑领地, 2=白领地, 3=中立
                const visited = new Set();

                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] !== EMPTY) continue;
                        const key = `${r},${c}`;
                        if (visited.has(key)) continue;
                        // BFS找连通空地
                        const region = [];
                        const borderColors = new Set();
                        const stack = [{ row: r, col: c }];
                        visited.add(key);
                        while (stack.length > 0) {
                            const { row: cr, col: cc } = stack.pop();
                            region.push({ row: cr, col: cc });
                            const neighbors = getNeighbors(cr, cc);
                            for (const { row: nr, col: nc } of neighbors) {
                                const nkey = `${nr},${nc}`;
                                if (board[nr][nc] === EMPTY && !visited.has(nkey)) {
                                    visited.add(nkey);
                                    stack.push({ row: nr, col: nc });
                                } else if (board[nr][nc] !== EMPTY) {
                                    borderColors.add(board[nr][nc]);
                                }
                            }
                        }
                        let owner = 0;
                        if (borderColors.size === 1) {
                            owner = borderColors.has(BLACK) ? BLACK : WHITE;
                        } else if (borderColors.size === 0) {
                            owner = 3; // 完全被包围但没有边界（不太可能）
                        } else {
                            owner = 3; // 中立
                        }
                        for (const { row: rr, col: rc } of region) {
                            territoryOwner[rr][rc] = owner;
                        }
                    }
                }

                let blackTerritory = 0;
                let whiteTerritory = 0;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (territoryOwner[r][c] === BLACK) blackTerritory++;
                        if (territoryOwner[r][c] === WHITE) whiteTerritory++;
                    }
                }

                // 中国规则：子空皆地
                let blackStonesOnBoard = 0;
                let whiteStonesOnBoard = 0;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] === BLACK) blackStonesOnBoard++;
                        if (board[r][c] === WHITE) whiteStonesOnBoard++;
                    }
                }

                const komi = 6.5; // 贴目
                const blackScore = blackStonesOnBoard + blackTerritory;
                const whiteScore = whiteStonesOnBoard + whiteTerritory + komi;

                return {
                    black: blackScore,
                    white: whiteScore,
                    blackTerritory,
                    whiteTerritory,
                    blackStones: blackStonesOnBoard,
                    whiteStones: whiteStonesOnBoard,
                    komi,
                };
            }

            function showResultModal(score) {
                if (!score) score = calculateScore();
                const blackTotal = score.black;
                const whiteTotal = score.white;
                let winnerName, winnerColor, diff;
                if (blackTotal > whiteTotal) {
                    winnerName = userName || '黑方';
                    winnerColor = '黑方';
                    diff = (blackTotal - whiteTotal).toFixed(1);
                } else if (whiteTotal > blackTotal) {
                    winnerName = opponentName || '白方';
                    winnerColor = '白方';
                    diff = (whiteTotal - blackTotal).toFixed(1);
                } else {
                    winnerName = '双方';
                    winnerColor = '平局';
                    diff = '0';
                }
                modalTitle.textContent = winnerColor === '平局' ? '🤝 平局！' : `🎉 ${winnerName}获胜！`;
                modalDetail.innerHTML = `
                    <div style="margin-bottom:8px;"><strong>${winnerColor === '平局' ? '双方平分秋色' : winnerColor + ' 胜 ' + diff + ' 目'}</strong></div>
                    <div style="font-size:13px;color:#6b5e4f;">
                        黑方：${score.blackStones}子 + ${score.blackTerritory}目 = <b>${score.black.toFixed(1)}</b> 目<br>
                        白方：${score.whiteStones}子 + ${score.whiteTerritory}目 + ${score.komi}贴目 = <b>${score.white.toFixed(1)}</b> 目
                    </div>
                `;
                modalOverlay.classList.add('show');
            }

            // ============ UI更新 ============
            function updateCapturedDisplay() {
                blackCapturedEl.textContent = '提子: ' + (capturedCount[BLACK] || 0);
                whiteCapturedEl.textContent = '提子: ' + (capturedCount[WHITE] || 0);
            }

            function updatePlayerHighlight() {
                if (gameOver) {
                    playerBlackInfo.classList.remove('active-player');
                    playerWhiteInfo.classList.remove('active-player');
                    if (winner === BLACK) playerBlackInfo.classList.add('active-player');
                    if (winner === WHITE) playerWhiteInfo.classList.add('active-player');
                } else {
                    if (currentPlayer === BLACK) {
                        playerBlackInfo.classList.add('active-player');
                        playerWhiteInfo.classList.remove('active-player');
                    } else {
                        playerWhiteInfo.classList.add('active-player');
                        playerBlackInfo.classList.remove('active-player');
                    }
                }
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 1800);
            }

            // ============ Canvas绘制 ============
            function resizeCanvas() {
                const wrapperWidth = boardWrapper.clientWidth;
                const wrapperHeight = boardWrapper.clientHeight;
                const size = Math.min(wrapperWidth, wrapperHeight);
                canvasLogicalSize = Math.floor(size);
                cellSize = (canvasLogicalSize - 2 * padding) / (BOARD_SIZE - 1);
                // 如果cellSize太小，调整padding
                if (cellSize < 16) {
                    padding = Math.floor(canvasLogicalSize * 0.04);
                    cellSize = (canvasLogicalSize - 2 * padding) / (BOARD_SIZE - 1);
                }
                if (cellSize > 24) {
                    cellSize = 24;
                    padding = Math.floor((canvasLogicalSize - cellSize * (BOARD_SIZE - 1)) / 2);
                }
                const physicalSize = Math.floor(canvasLogicalSize * dpr);
                boardCanvas.width = physicalSize;
                boardCanvas.height = physicalSize;
                boardCanvas.style.width = canvasLogicalSize + 'px';
                boardCanvas.style.height = canvasLogicalSize + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }

            function drawBoard() {
                resizeCanvas();
                const cw = canvasLogicalSize;
                const ch = canvasLogicalSize;
                ctx.clearRect(0, 0, cw, ch);

                // 棋盘背景（木色带纹理）
                const woodGrad = ctx.createLinearGradient(0, 0, cw, ch);
                woodGrad.addColorStop(0, '#e2c898');
                woodGrad.addColorStop(0.3, '#dbb870');
                woodGrad.addColorStop(0.6, '#d4a95a');
                woodGrad.addColorStop(1, '#c89848');
                ctx.fillStyle = woodGrad;
                ctx.fillRect(0, 0, cw, ch);

                // 细微纹理
                ctx.fillStyle = 'rgba(255,255,255,0.03)';
                for (let i = 0; i < cw; i += 6) {
                    ctx.fillRect(i, 0, 1, ch);
                }
                for (let j = 0; j < ch; j += 6) {
                    ctx.fillRect(0, j, cw, 1);
                }

                // 网格线
                const gridStart = padding;
                const gridEnd = padding + cellSize * (BOARD_SIZE - 1);
                ctx.strokeStyle = '#3d2b15';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                for (let i = 0; i < BOARD_SIZE; i++) {
                    const pos = padding + i * cellSize;
                    ctx.moveTo(gridStart, pos);
                    ctx.lineTo(gridEnd, pos);
                    ctx.moveTo(pos, gridStart);
                    ctx.lineTo(pos, gridEnd);
                }
                ctx.stroke();

                // 外框加粗
                ctx.strokeStyle = '#2a1a0a';
                ctx.lineWidth = 2.2;
                ctx.strokeRect(gridStart, gridStart, gridEnd - gridStart, gridEnd - gridStart);

                // 星位
                const starPoints = [
                    [3, 3],
                    [3, 9],
                    [3, 15],
                    [9, 3],
                    [9, 9],
                    [9, 15],
                    [15, 3],
                    [15, 9],
                    [15, 15]
                ];
                for (const [r, c] of starPoints) {
                    const cx = padding + c * cellSize;
                    const cy = padding + r * cellSize;
                    ctx.fillStyle = '#2a1a0a';
                    ctx.beginPath();
                    ctx.arc(cx, cy, cellSize * 0.2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 绘制棋子
                for (let r = 0; r < BOARD_SIZE; r++) {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        if (board[r][c] !== EMPTY) {
                            drawStone(r, c, board[r][c], false);
                        }
                    }
                }

                // 最后一手标记
                if (lastMove && !gameOver) {
                    const { row, col } = lastMove;
                    const cx = padding + col * cellSize;
                    const cy = padding + row * cellSize;
                    const markColor = board[row][col] === BLACK ? '#f5f5f0' : '#1a1a1a';
                    ctx.fillStyle = markColor;
                    ctx.beginPath();
                    ctx.arc(cx, cy, cellSize * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 预览棋子（hover）
                if (hoveredCell && !gameOver && board[hoveredCell.row][hoveredCell.col] === EMPTY) {
                    const { row, col } = hoveredCell;
                    // 检查是否合法
                    const origBoard = board[row][col];
                    board[row][col] = currentPlayer;
                    const isSuicideMove = isSuicideCheckSimple(row, col, currentPlayer);
                    const isKo = isKoViolationSimple(row, col, currentPlayer);
                    board[row][col] = origBoard;
                    const isValid = !isSuicideMove && !isKo;
                    drawStone(row, col, currentPlayer, true, isValid);
                }
            }

            function isSuicideCheckSimple(row, col, playerColor) {
                board[row][col] = playerColor;
                const captured = findCapturedOpponentGroups(row, col, playerColor);
                const removedStones = [];
                for (const { row: cr, col: cc } of captured) {
                    removedStones.push({ row: cr, col: cc, color: board[cr][cc] });
                    board[cr][cc] = EMPTY;
                }
                const { liberties } = getGroup(row, col);
                const suicide = liberties.size === 0 && captured.length === 0;
                for (const { row: rr, col: rc, color: rcolor } of removedStones) {
                    board[rr][rc] = rcolor;
                }
                board[row][col] = EMPTY;
                return suicide;
            }

            function isKoViolationSimple(row, col, playerColor) {
                board[row][col] = playerColor;
                const captured = findCapturedOpponentGroups(row, col, playerColor);
                const removedStones = [];
                for (const { row: cr, col: cc } of captured) {
                    removedStones.push({ row: cr, col: cc, color: board[cr][cc] });
                    board[cr][cc] = EMPTY;
                }
                const newHash = getBoardHash();
                for (const { row: rr, col: rc, color: rcolor } of removedStones) {
                    board[rr][rc] = rcolor;
                }
                board[row][col] = EMPTY;
                return newHash === previousBoardHash;
            }

            function drawStone(row, col, color, isPreview, isValid) {
                const cx = padding + col * cellSize;
                const cy = padding + row * cellSize;
                const radius = cellSize * 0.46;

                ctx.save();
                if (isPreview) {
                    ctx.globalAlpha = isValid ? 0.55 : 0.25;
                }

                // 阴影
                if (!isPreview) {
                    ctx.fillStyle = 'rgba(0,0,0,0.25)';
                    ctx.beginPath();
                    ctx.arc(cx + 1.5, cy + 2, radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 棋子主体
                let grad;
                if (color === BLACK) {
                    grad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.35, radius * 0.08, cx, cy, radius);
                    grad.addColorStop(0, '#6a6a6a');
                    grad.addColorStop(0.4, '#2a2a2a');
                    grad.addColorStop(0.85, '#0a0a0a');
                    grad.addColorStop(1, '#1a1a1a');
                } else {
                    grad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.35, radius * 0.08, cx, cy, radius);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.35, '#f8f6f0');
                    grad.addColorStop(0.75, '#e0dcd0');
                    grad.addColorStop(1, '#c5bfb0');
                }
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fill();

                // 光泽
                if (color === BLACK) {
                    ctx.fillStyle = 'rgba(255,255,255,0.07)';
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                }
                ctx.beginPath();
                ctx.arc(cx - radius * 0.28, cy - radius * 0.3, radius * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // 预览时加边框
                if (isPreview && isValid) {
                    ctx.strokeStyle = 'rgba(255,200,60,0.8)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 3]);
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius + 2, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                if (isPreview && !isValid) {
                    ctx.strokeStyle = 'rgba(255,80,80,0.6)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 3]);
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius + 2, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.restore();
            }

            // ============ 坐标转换 ============
            function canvasToGrid(clientX, clientY) {
                const rect = boardCanvas.getBoundingClientRect();
                const scaleX = canvasLogicalSize / rect.width;
                const scaleY = canvasLogicalSize / rect.height;
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                const col = Math.round((x - padding) / cellSize);
                const row = Math.round((y - padding) / cellSize);
                const nearestX = padding + col * cellSize;
                const nearestY = padding + row * cellSize;
                const dist = Math.sqrt((x - nearestX) ** 2 + (y - nearestY) ** 2);
                if (dist < cellSize * 0.55 && row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
                    return { row, col };
                }
                return null;
            }

            // ============ 事件处理 ============
            function handleBoardInteraction(clientX, clientY, isFinal) {
                if (gameOver) return;
                const grid = canvasToGrid(clientX, clientY);
                if (isFinal) {
                    // 确认落子
                    if (grid && board[grid.row][grid.col] === EMPTY) {
                        const success = placeStone(grid.row, grid.col);
                        if (!success && board[grid.row][grid.col] === EMPTY) {
                            // 检查具体原因
                            const isSui = isSuicideCheckSimple(grid.row, grid.col, currentPlayer);
                            const isKo = isKoViolationSimple(grid.row, grid.col, currentPlayer);
                            if (isKo) showToast('⛔ 打劫！不能立即回提');
                            else if (isSui) showToast('⛔ 此处为自杀，禁止落子');
                        }
                    }
                    hoveredCell = null;
                    drawBoard();
                } else {
                    // 仅预览
                    if (grid && board[grid.row][grid.col] === EMPTY) {
                        if (!hoveredCell || hoveredCell.row !== grid.row || hoveredCell.col !== grid.col) {
                            hoveredCell = grid;
                            drawBoard();
                        }
                    } else if (hoveredCell) {
                        hoveredCell = null;
                        drawBoard();
                    }
                }
            }

            boardCanvas.addEventListener('mousemove', (e) => {
                handleBoardInteraction(e.clientX, e.clientY, false);
            });
            boardCanvas.addEventListener('click', (e) => {
                handleBoardInteraction(e.clientX, e.clientY, true);
            });
            boardCanvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    e.preventDefault();
                    handleBoardInteraction(e.touches[0].clientX, e.touches[0].clientY, false);
                }
            }, { passive: false });
            boardCanvas.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1) {
                    e.preventDefault();
                    handleBoardInteraction(e.touches[0].clientX, e.touches[0].clientY, false);
                }
            }, { passive: false });
            boardCanvas.addEventListener('touchend', (e) => {
                if (hoveredCell && !gameOver) {
                    e.preventDefault();
                    const grid = hoveredCell;
                    if (board[grid.row][grid.col] === EMPTY) {
                        const success = placeStone(grid.row, grid.col);
                        if (!success && board[grid.row][grid.col] === EMPTY) {
                            const isSui = isSuicideCheckSimple(grid.row, grid.col, currentPlayer);
                            const isKo = isKoViolationSimple(grid.row, grid.col, currentPlayer);
                            if (isKo) showToast('⛔ 打劫！不能立即回提');
                            else if (isSui) showToast('⛔ 此处为自杀，禁止落子');
                        }
                    }
                    hoveredCell = null;
                    drawBoard();
                }
            });
            boardCanvas.addEventListener('mouseleave', () => {
                if (hoveredCell) {
                    hoveredCell = null;
                    drawBoard();
                }
            });

            // 按钮事件
            btnPass.addEventListener('click', doPass);
            btnUndo.addEventListener('click', undoMove);
            btnResign.addEventListener('click', () => {
                if (!gameOver && confirm('确定要认输吗？')) {
                    resign();
                }
            });
            btnRestart.addEventListener('click', () => {
                if (!gameOver && moveHistory.length > 0) {
                    if (!confirm('确定要重新开始吗？当前对局进度将丢失。')) return;
                }
                resetGame();
                showToast('🔄 对局已重置');
            });
            btnModalRestart.addEventListener('click', () => {
                modalOverlay.classList.remove('show');
                resetGame();
                showToast('🔄 新对局开始！');
            });
            btnModalClose.addEventListener('click', () => {
                modalOverlay.classList.remove('show');
            });
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    modalOverlay.classList.remove('show');
                }
            });

            // 窗口大小变化时重绘
            let resizeDebounce;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    resizeCanvas();
                    drawBoard();
                }, 200);
            });

            // 键盘快捷键
            window.addEventListener('keydown', (e) => {
                if (e.key === 'p' || e.key === 'P') doPass();
                if (e.key === 'u' || e.key === 'U') undoMove();
                if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    undoMove();
                }
            });

            // ============ 登录逻辑 ============
            // 颜色选择
            const colorOptions = document.querySelectorAll('.color-option');
            colorOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    colorOptions.forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    userColorPreference = opt.dataset.color;
                });
            });

            // 开始按钮
            btnStart.addEventListener('click', () => {
                userName = nicknameInput.value.trim() || '棋手';
                opponentName = '对手';
                userColorPreference = document.querySelector('.color-option.selected')?.dataset
                    ?.color || 'random';

                // 确定用户颜色
                let userColor;
                if (userColorPreference === 'random') {
                    userColor = Math.random() < 0.5 ? BLACK : WHITE;
                } else if (userColorPreference === 'black') {
                    userColor = BLACK;
                } else {
                    userColor = WHITE;
                }

                // 设置显示名称
                if (userColor === BLACK) {
                    blackNameEl.textContent = userName;
                    whiteNameEl.textContent = opponentName;
                } else {
                    blackNameEl.textContent = opponentName;
                    whiteNameEl.textContent = userName;
                }

                // 重置游戏
                resetGame();
                currentPlayer = BLACK; // 黑方先行

                // 切换界面
                loginContainer.classList.add('hidden');
                gameContainer.classList.add('active');

                // 更新高亮
                updatePlayerHighlight();
                updateCapturedDisplay();
                drawBoard();

                showToast('🎯 ' + (userColor === BLACK ? '你执黑先行' : '你执白，对手先行') + '，加油！');

                // 保存设置到localStorage
                try {
                    localStorage.setItem('go_nickname', userName);
                    localStorage.setItem('go_color_preference', userColorPreference);
                } catch (e) {}
            });

            // 回车键开始
            nicknameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    btnStart.click();
                }
            });

            // 加载保存的昵称
            try {
                const savedName = localStorage.getItem('go_nickname');
                const savedColor = localStorage.getItem('go_color_preference');
                if (savedName) nicknameInput.value = savedName;
                if (savedColor) {
                    userColorPreference = savedColor;
                    colorOptions.forEach(o => o.classList.remove('selected'));
                    const matched = document.querySelector(`.color-option[data-color="${savedColor}"]`);
                    if (matched) matched.classList.add('selected');
                }
            } catch (e) {}

            // ============ 初始绘制 ============
            resizeCanvas();
            drawBoard();
            updatePlayerHighlight();
            updateCapturedDisplay();

            // 初始状态：游戏界面不可交互（需登录）
            gameContainer.classList.remove('active');

            console.log('🀄 围棋游戏已就绪');
            console.log('   - 19×19 标准棋盘');
            console.log('   - 支持双人对弈');
            console.log('   - 完整规则：提子、打劫、自杀检测');
            console.log('   - 双虚手结束，中国规则计分（贴6.5目）');
            console.log('   - 快捷键：P=虚手 U=悔棋 Ctrl+Z=悔棋');
            console.log('   📱 手机端触摸优化：触摸预览 → 松手落子');
        })();
    </script>
</body>
</html>
